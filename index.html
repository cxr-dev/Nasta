<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Nasta/logosvg.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#635BFF" />
    <meta
      name="description"
      content="Nästa - Swedish public transit commute tracker"
    />
    <link rel="manifest" href="/Nasta/manifest.json?v=3" />

    <!-- iOS home screen support -->
    <link rel="apple-touch-icon" href="/Nasta/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Nästa" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SL departure API — prefetch DNS before JS loads -->
    <link rel="dns-prefetch" href="https://transport.integration.sl.se" />
    <link rel="preconnect" href="https://transport.integration.sl.se" />

    <!-- Fonts: Neue Machina for display, Satoshi for body — async, non-blocking -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://api.fontshare.com/v2/css?f[]=neue-machina@700,800&f[]=satoshi@400,500,700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://api.fontshare.com/v2/css?f[]=neue-machina@700,800&f[]=satoshi@400,500,700&display=swap"
      />
    </noscript>

    <title>Nästa</title>
    <style>
      /* Prevent pull-to-refresh and overscroll */
      html,
      body {
        overscroll-behavior: none;
      }
      /* Ensure inputs don't zoom on iOS */
      input,
      select,
      textarea {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
