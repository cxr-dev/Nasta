<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: deep midnight -->
  <rect width="32" height="32" fill="#0A0B1A"/>

  <!-- Amber border (2px = 1 pixel on 4px grid) -->
  <rect x="0"  y="0"  width="32" height="2"  fill="#FFBE0B"/>
  <rect x="0"  y="30" width="32" height="2"  fill="#FFBE0B"/>
  <rect x="0"  y="0"  width="2"  height="32" fill="#FFBE0B"/>
  <rect x="30" y="0"  width="2"  height="32" fill="#FFBE0B"/>

  <!--
    N letterform — 5×7 pixel grid, 4px per block
    Centered: x_start=6, y_start=2
    Columns: col0=6, col1=10, col2=14, col3=18, col4=22
    Rows:    row0=2, row1=6, row2=10, row3=14, row4=18, row5=22, row6=26
    All white for max legibility at small sizes
  -->

  <!-- Left column -->
  <rect x="6" y="2"  width="4" height="4" fill="#FFFFFF"/>
  <rect x="6" y="6"  width="4" height="4" fill="#FFFFFF"/>
  <rect x="6" y="10" width="4" height="4" fill="#FFFFFF"/>
  <rect x="6" y="14" width="4" height="4" fill="#FFFFFF"/>
  <rect x="6" y="18" width="4" height="4" fill="#FFFFFF"/>
  <rect x="6" y="22" width="4" height="4" fill="#FFFFFF"/>
  <rect x="6" y="26" width="4" height="4" fill="#FFFFFF"/>

  <!-- Diagonal -->
  <rect x="10" y="6"  width="4" height="4" fill="#FFFFFF"/>
  <rect x="10" y="10" width="4" height="4" fill="#FFFFFF"/>
  <rect x="14" y="14" width="4" height="4" fill="#FFFFFF"/>
  <rect x="18" y="18" width="4" height="4" fill="#FFFFFF"/>
  <rect x="18" y="22" width="4" height="4" fill="#FFFFFF"/>

  <!-- Right column -->
  <rect x="22" y="2"  width="4" height="4" fill="#FFFFFF"/>
  <rect x="22" y="6"  width="4" height="4" fill="#FFFFFF"/>
  <rect x="22" y="10" width="4" height="4" fill="#FFFFFF"/>
  <rect x="22" y="14" width="4" height="4" fill="#FFFFFF"/>
  <rect x="22" y="18" width="4" height="4" fill="#FFFFFF"/>
  <rect x="22" y="22" width="4" height="4" fill="#FFFFFF"/>
  <rect x="22" y="26" width="4" height="4" fill="#FFFFFF"/>
</svg>
