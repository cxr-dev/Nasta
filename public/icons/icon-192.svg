<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background: deep midnight -->
  <rect width="192" height="192" fill="#0A0B1A"/>

  <!-- Amber gold border frame (6px ≈ 1 pixel on scaled grid) -->
  <rect x="0"   y="0"   width="192" height="6"   fill="#FFBE0B"/>
  <rect x="0"   y="186" width="192" height="6"   fill="#FFBE0B"/>
  <rect x="0"   y="0"   width="6"   height="192" fill="#FFBE0B"/>
  <rect x="186" y="0"   width="6"   height="192" fill="#FFBE0B"/>

  <!--
    N letterform — 5×7 pixel grid, 15px per block
    Centered: x_start=58.5, y_start=43.5
    Columns: col0=58.5, col1=73.5, col2=88.5, col3=103.5, col4=118.5
    Rows:    row0=43.5, row1=58.5, row2=73.5, row3=88.5, row4=103.5, row5=118.5, row6=133.5
  -->

  <!-- Left column — red -->
  <rect x="58.5" y="43.5"  width="15" height="15" fill="#E63946"/>
  <rect x="58.5" y="58.5"  width="15" height="15" fill="#E63946"/>
  <rect x="58.5" y="73.5"  width="15" height="15" fill="#E63946"/>
  <rect x="58.5" y="88.5"  width="15" height="15" fill="#E63946"/>
  <rect x="58.5" y="103.5" width="15" height="15" fill="#E63946"/>
  <rect x="58.5" y="118.5" width="15" height="15" fill="#E63946"/>
  <rect x="58.5" y="133.5" width="15" height="15" fill="#E63946"/>

  <!-- Diagonal — amber gold -->
  <rect x="73.5"  y="58.5"  width="15" height="15" fill="#FFBE0B"/>
  <rect x="73.5"  y="73.5"  width="15" height="15" fill="#FFBE0B"/>
  <rect x="88.5"  y="88.5"  width="15" height="15" fill="#FFBE0B"/>
  <rect x="103.5" y="103.5" width="15" height="15" fill="#FFBE0B"/>
  <rect x="103.5" y="118.5" width="15" height="15" fill="#FFBE0B"/>

  <!-- Right column — blue -->
  <rect x="118.5" y="43.5"  width="15" height="15" fill="#3A86FF"/>
  <rect x="118.5" y="58.5"  width="15" height="15" fill="#3A86FF"/>
  <rect x="118.5" y="73.5"  width="15" height="15" fill="#3A86FF"/>
  <rect x="118.5" y="88.5"  width="15" height="15" fill="#3A86FF"/>
  <rect x="118.5" y="103.5" width="15" height="15" fill="#3A86FF"/>
  <rect x="118.5" y="118.5" width="15" height="15" fill="#3A86FF"/>
  <rect x="118.5" y="133.5" width="15" height="15" fill="#3A86FF"/>
</svg>
